<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Map | Tui Nabou Development</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    body.map-page {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(215, 189, 73, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(38, 92, 57, 0.18), transparent 34%),
        linear-gradient(135deg, #f7f5ea 0%, #eef4e7 45%, #f8f7ef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .map-logo {
      position: absolute;
      top: 28px;
      left: 28px;
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.9rem 1.05rem;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(38, 92, 57, 0.14);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(26, 60, 36, 0.16);
      color: #183223;
      text-decoration: none;
      backdrop-filter: blur(12px);
    }
    .map-logo img {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(214, 183, 69, 0.5);
    }
    .map-logo span {
      display: block;
      line-height: 1.2;
      font-weight: 700;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }
    .map-logo small {
      display: block;
      color: #5b6758;
      margin-top: 0.15rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .map-frame {
      width: min(100%, 1800px);
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(38, 92, 57, 0.14);
      border-radius: 34px;
      box-shadow: 0 30px 80px rgba(26, 60, 36, 0.18);
      padding: 1.25rem;
      backdrop-filter: blur(16px);
    }
    .map-frame img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 24px;
    }
  </style>
</head>
<body class="map-page">
  <a class="map-logo" href="index.html">
    <img src="assets/senibua.png" alt="Senibua logo" />
    <span>Tui Nabou Development<small>Project map</small></span>
  </a>
  <div class="map-frame">
    <img src="assets/gallery/project-gallery-1.jpg" width="1200" height="600" alt="Project map and promotional image" />
  </div>
</body>
</html>
